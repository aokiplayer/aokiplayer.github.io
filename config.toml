baseURL = "https://yagamo-style.com/"
languageCode = "ja-JP"
defaultContentLanguage = "ja"
title = "Yagamo Style"

# ref / relref で見つからない参照はビルドを止めず warning に
refLinksErrorLevel = "WARNING"

# Hugo Modules で Hextra テーマを取得
[module]
[[module.imports]]
path = "github.com/imfing/hextra"

# 既存記事の HTML を壊さないため goldmark で raw HTML 許可
[markup]
[markup.goldmark]
[markup.goldmark.renderer]
unsafe = true

# 既存 URL を維持するためのパーマリンク設定
[permalinks]
2026 = '/:year/:month/:day/:filename/'
2025 = '/:year/:month/:day/:filename/'
2024 = '/:year/:month/:day/:filename/'
2023 = '/:year/:month/:day/:filename/'
2022 = '/:year/:month/:day/:filename/'
2021 = '/:year/:month/:day/:filename/'
2020 = '/:year/:month/:day/:filename/'
2019 = '/:year/:month/:day/:filename/'
2018 = '/:year/:month/:day/:filename/'

[outputs]
home = ["HTML", "RSS"]

[params]
description = "技術メモとかイベントレポートとか"

# サイト全体のデフォルト OG 画像（SNS リンク共有時のプレビュー画像）
# 各ページのフロントマターで images = [...] を指定すれば上書き可能
images = ["images/open_graph_logo.png"]

# 自分のカスタム CSS（既存）も残す
custom_css = ["css/custom.css"]

[params.author]
name = "Steven Hiroyuki Aoki"
email = ""
